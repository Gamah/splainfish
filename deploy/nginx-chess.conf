# splainfish served at https://notadomain.lol/chess/
#
# Drop this `location` block into the existing `server { }` for notadomain.lol
# whose `root` is /var/www/notadomain.lol. The app files live in
# /var/www/notadomain.lol/chess/ (deploy them there — see deploy/deploy.sh).
#
# Nothing special is required beyond static hosting:
#   - The app is a plain ES-module static site. Ensure `include mime.types;` is
#     present in your http{} block so .js is served with a JavaScript MIME type
#     (ES modules are rejected if served as text/plain). It is in stock nginx.
#   - Stockfish (WASM) and chessground/chess.js load from public CDNs, so no
#     .wasm MIME type or COOP/COEP headers are needed here. The single-threaded
#     engine deliberately avoids SharedArrayBuffer, so cross-origin isolation is
#     not required.
#   - The ~71 MB .nnue network is served from this host (no public CORS host
#     exists for it). nginx serves byte ranges and Content-Length for static
#     files by default, which is all the loader needs.

# Redirect the bare path to the trailing-slash form so relative URLs resolve.
location = /chess {
    return 301 /chess/;
}

location /chess/ {
    # `root` is inherited from the server block (/var/www/notadomain.lol), so
    # /chess/ maps to /var/www/notadomain.lol/chess/. index.html is the entry.
    try_files $uri $uri/ /chess/index.html;
}

# The network filename is content-addressed (its hash is in the name), so it is
# safe to cache hard and forever. The app also caches it in IndexedDB after the
# first load, so most visits never re-request it.
location ~* /chess/.*\.nnue$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
    # .nnue has no MIME mapping; octet-stream (nginx default_type) is correct.
    default_type application/octet-stream;
    # Do not waste CPU gzipping it — quantized weights barely compress.
    gzip off;
}
